version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: akenzhan-postgres
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - akenzhan-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: akenzhan-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/taskdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: AkenzhanAssanaliSecretKeyForJWTTokenGeneration2024VeryLongSecretKey
      JWT_EXPIRATION: 86400000
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - akenzhan-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  akenzhan-network:
    driver: bridge
